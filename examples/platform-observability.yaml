apiVersion: observability.platform/v1alpha1
kind: PlatformObservability
metadata:
  name: generic-kubernetes-platform
platform:
  topology:
    - platform
    - cluster
    - namespace
    - node
    - workload
    - pod
    - container
    - route
  enforcement:
    - schema
    - ci
    - helm
    - admission
    - runtime
  metadataCoverage:
    required:
      - platform
      - cluster
      - namespace
      - workload
      - owner
      - environment
      - route
      - version
      - change
    purpose: filtering, routing, topology correlation, and decision dashboard scoping
  signalLayers:
    - platform
    - cluster
    - namespace
    - node
    - workload
    - pod
    - container
    - route
    - network
    - telemetry-pipeline
    - policy
    - event
    - inventory
    - change
signals:
  - workload_health
  - route_backend_readiness
  - capacity_pressure
  - control_plane_health
  - telemetry_pipeline_health
  - policy_drift
  - event_inventory_health
  - topology_correlation
telemetryPipeline:
  purpose: telemetry pipeline health
  topology:
    sources:
      - application telemetry
      - platform events
      - object inventory
      - change records
      - pipeline self-observability
    processors:
      - semantic attribute normalization
      - redaction
      - sampling
      - routing
      - cardinality limiting
    sinks:
      - primary telemetry backend
      - incident-critical fallback path
      - quarantine store
    lineageRequired: true
  deliveryPolicy:
    default: best-effort diagnostic telemetry
    incidentCritical: durable delivery with acknowledgement or explicit backend-generation gap
    acknowledgementRequiredFor:
      - SLO evaluation telemetry
      - audit telemetry
      - security telemetry
      - incident-critical pipeline health
  bufferPolicy:
    defaultWhenFull: block or sample before dropping incident-critical telemetry
    durableFor:
      - SLO evaluation telemetry
      - audit telemetry
      - security telemetry
    signals:
      - queue depth
      - buffer bytes
      - oldest buffered item age
      - dropped telemetry count
      - blocked upstream clients
  requiredSignals:
    - collector health
    - source health
    - receiver health
    - processor health
    - queue pressure
    - buffer pressure
    - dropped metrics
    - dropped logs
    - dropped spans
    - redaction failures
    - cardinality-limit actions
    - exporter errors
    - acknowledgement status
    - backend delivery freshness
  validation:
    - topology validation
    - transformation unit tests
    - redaction tests
    - cardinality-limit tests
    - delivery and buffer policy checks
alertContext:
  contract: infrastructure alert context contract
  required:
    - identity
    - ownership
    - impact
    - current state
    - change context
    - technical evidence
    - decision support
decisionDashboards:
  requiredQuestions:
    - Is the platform able to host and route workloads?
    - Is the issue isolated or platform-wide?
    - Did a rollout, config, autoscaling, policy, node, or route change precede it?
    - Are application SLOs or user journeys affected?
    - Is telemetry missing, delayed, or dropped?
